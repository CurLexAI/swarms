# mypy configuration for the Constitutional Compliance gate.
#
# The compliance workflow runs `mypy --strict .`. Strict mode requires every
# imported module to resolve to real types. Typed dependencies (pydantic,
# httpx, fastapi) are installed in CI so their types are available. The
# remaining third-party libraries below ship no type information and are not
# installed in the lint job, so they are treated as untyped imports here. This
# keeps `--strict` honest for our own code without forcing heavyweight,
# stub-less packages (e.g. FlagEmbedding/torch) into the lint environment.
[mypy]

[mypy-modal.*]
ignore_missing_imports = True

[mypy-minio.*]
ignore_missing_imports = True

[mypy-bs4]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-pdfplumber]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

[mypy-qdrant_client.*]
ignore_missing_imports = True

[mypy-FlagEmbedding.*]
ignore_missing_imports = True

[mypy-qarar_swarms.*]
ignore_missing_imports = True
