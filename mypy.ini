# mypy configuration for the Constitutional Compliance gate.
#
# The compliance workflow runs `mypy --strict .`. Strict mode requires every
# imported module to resolve to real types. Typed dependencies (pydantic,
# httpx) are installed in CI so their types are available. The remaining
# third-party libraries below ship no type information and are not installed
# in the lint job, so they are treated as untyped imports here. This keeps
# `--strict` honest for our own code without forcing heavyweight, stub-less
# packages (e.g. FlagEmbedding/torch) into the lint environment.
#
# `explicit_package_bases = True` prevents mypy from resolving the same file
# under two module names when the repo root is on sys.path alongside named
# packages (e.g. scripts/command_center_archiver.py found as both
# "command_center_archiver" and "scripts.command_center_archiver").
#
# `exclude` skips modal/qarar_rag_infra.py — Modal SDK decorators create
# runtime-only types (Volume, Image, App, @enter, @exit) that have no stubs.
# The file is backend-only infra; it is not called from typed code paths.
# Tests for _agents_loader are skipped because the module is a test-local
# path-manipulation helper resolved only at pytest runtime, not by mypy.
[mypy]
explicit_package_bases = True
exclude = (?x)(
    ^modal/qarar_rag_infra\.py$
  | ^tests/_agents_loader\.py$
  | ^\.agents/mcp/server_offline\.py$
  )

# Modal SDK — stubs are private; ignore all submodules too.
[mypy-modal.*]
ignore_missing_imports = True

# FastAPI — not installed in the compliance lint environment.
[mypy-fastapi]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

# _agents_loader is a pytest-runtime test helper, not importable by mypy.
[mypy-_agents_loader]
ignore_missing_imports = True

[mypy-minio.*]
ignore_missing_imports = True

[mypy-bs4]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-pdfplumber]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

[mypy-qdrant_client.*]
ignore_missing_imports = True

[mypy-FlagEmbedding.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-qarar_swarms.*]
ignore_missing_imports = True

# PyYAML — ships no type stubs and is not installed in the compliance lint job.
[mypy-yaml]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True
