services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:6379:6379"

  mihwar-core:
    build:
      context: ./mihwar-core
    environment:
      MIHWAR_ENV: ${MIHWAR_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      MIHWAR_HMAC_SECRET: ${MIHWAR_HMAC_SECRET:?MIHWAR_HMAC_SECRET is required}
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
