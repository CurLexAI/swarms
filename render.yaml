services:
  - type: web
    name: curlexai-mcp-server
    runtime: node
    rootDir: .agents/mcp/modal-mcp
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    port: 8787
    envVars:
      - key: MCP_BASE_URL
        value: https://curlexai-mcp-server.onrender.com
      - key: MCP_BEARER_TOKEN
        sync: false
      - key: MODAL_API_TOKEN
        sync: false
      - key: MODAL_API_BASE_URL
        value: https://api.modal.com
      - key: ENABLE_MUTATING_TOOLS
        value: "false"
      - key: MODAL_DEPLOYMENT_ALLOWLIST
        value: ""
      - key: MAX_LOG_LINES
        value: "200"
      - key: MIHWAR_ENDPOINT
        value: https://curlexai--mihwar-generate.modal.run
      - key: BAYYINAH_ENDPOINT
        value: https://curlexai--bayyinah-review.modal.run
      - key: AGENT_API_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
