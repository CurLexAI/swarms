services:
  - type: web
    name: SR.BSM
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci --include=dev && npm run test:render-public && npm run check:cdn-sri
    startCommand: npm start
    port: 10000
    healthCheckPath: /healthz
    autoDeploy: false
    # Render service: srv-d5uin6p4tr6s73e0d89g
    # Public domain: www.lexprim.com
    # Internal address: sr-bsm:10000 over HTTP inside Render private networking.
    # This service serves the public trust surface only. Agent runtimes and
    # private Modal endpoints remain backend-only and must not be exposed here.
    envVars:
      - key: NODE_ENV
        value: production
