<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>LexPrim — نظام التحكم الذكي</title>

  <script>
    window.__DEV_EXTERNAL_CDN_FALLBACK__ = false;
  </script>
  <script>
    (async () => {
      const fallbackMap = {
        vue: 'https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js',
        lucide: 'https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js',
        marked: 'https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js',
        dompurify: 'https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js'
      };

      const manifestResponse = await fetch('/control/vendor/integrity.json', { cache: 'no-store' });
      if (!manifestResponse.ok) throw new Error('Missing integrity manifest');
      const manifest = await manifestResponse.json();

      async function loadScript(name) {
        const info = manifest[name];
        if (!info) throw new Error(`Missing manifest entry: ${name}`);

        try {
          await appendScript(info.path, info.integrity);
          return;
        } catch (localError) {
          if (!window.__DEV_EXTERNAL_CDN_FALLBACK__) throw localError;
          await appendScript(fallbackMap[name], undefined);
        }
      }

      function appendScript(src, integrity) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          if (integrity) {
            script.integrity = integrity;
            script.crossOrigin = 'anonymous';
          }
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed script: ${src}`));
          document.head.appendChild(script);
        });
      }

      await loadScript('vue');
      await loadScript('lucide');
      await loadScript('marked');
      await loadScript('dompurify');

      await appendScript('/src/control-hub/app.js');
    })().catch((err) => {
      console.error('Critical frontend dependency bootstrap failure', err);
      document.body.innerHTML = '<pre style="color:#f85149;padding:16px">Failed to load frontend dependencies.</pre>';
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    #app { height: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b949e;font-size:14px;">
      Loading LexPrim Control Hub…
    </div>
  </div>
</body>
</html>
