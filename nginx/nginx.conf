user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # TLS 1.3 only
    ssl_protocols             TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    ssl_certificate     /certs/mihwar.crt;
    ssl_certificate_key /certs/mihwar.key;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # Logging with device ID propagation
    log_format sovereign '$remote_addr - $http_x_device_id [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'rt=$request_time';
    access_log /var/log/nginx/access.log sovereign;

    upstream mihwar_backend {
        server mihwar-core:8080;
        keepalive         100;
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    server {
        listen      443 ssl;
        server_name mihwar.qarar.sa;

        # HTTP/3 advertisement (QUIC handled by mihwar-core directly)
        add_header Alt-Svc 'h3=":443"; ma=86400' always;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location /api/ {
            proxy_pass         http://mihwar_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Device-ID       $http_x_device_id;
            proxy_read_timeout 30s;
        }

        location /mdm/ {
            proxy_pass         http://mihwar_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            client_max_body_size 5m;
        }

        location /health {
            proxy_pass http://mihwar_backend/health;
            access_log off;
        }
    }

    server {
        listen      80 default_server;
        server_name _;
        return      301 https://$host$request_uri;
    }
}
