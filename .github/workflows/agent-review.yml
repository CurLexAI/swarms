name: Sovereign PR Review (Local-First)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

# منع التشغيل المتكرر السريع
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ====== Job 1: التحقق من تشغيل الـ Agent بشكل صحيح ======
  agent-status:
    name: Verify Agent Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify agent module
        run: |
          python -c "import sys; sys.path.insert(0, '.agents'); from pr_review import SovereignReviewer; print('✅ Agent loaded successfully')"

  # ====== Job 2: تشغيل المراجعة السيادية ======
  sovereign-review:
    name: Run Sovereign PR Review
    needs: agent-status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pydantic

      - name: Get PR diff
        id: diff
        run: |
          echo "## PR Diff" >> $GITHUB_STEP_SUMMARY
          git diff origin/${{ github.base_ref }}...HEAD >> pr_diff.txt
          echo "::set-output name=size::$(wc -c < pr_diff.txt)"

      - name: Run Sovereign Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BAYYINAH_API_TOKEN: ${{ secrets.BAYYINAH_API_TOKEN }}
          MIHWAR_API_TOKEN: ${{ secrets.MIHWAR_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .agents/pr_review.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --diff-file pr_diff.txt \
            --output-format github \
            --post-comment

      - name: Upload diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff-${{ github.event.pull_request.number }}
          path: pr_diff.txt
          retention-days: 7

  # ====== Job 3: الفحوصات المحلية الإضافية ======
  local-gates:
    name: Local Security Gates
    needs: sovereign-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run integrity check
        run: |
          if [ -f "scripts/commander/qala-audit-integrity-gate.sh" ]; then
            bash scripts/commander/qala-audit-integrity-gate.sh . || echo "⚠️ Gate check failed (non-blocking)"
          else
            echo "ℹ️ Integrity gate script not found, skipping"
          fi
