name: render-preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: render-preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Render blueprint and derive service path
        id: render
        run: |
          set -euo pipefail
          if [ -f render.yaml ]; then
            echo "render.yaml found"
            ruby <<'RUBY'
          require 'yaml'

          path = 'render.yaml'
          data = YAML.safe_load_file(path, permitted_classes: [], aliases: false)
          unless data.is_a?(Hash)
            warn 'render.yaml must be a YAML mapping'
            exit 1
          end

          services = data['services']
          unless services.is_a?(Array) && !services.empty?
            warn 'render.yaml services must be a non-empty list'
            exit 1
          end

          service = services.find { |item| item.is_a?(Hash) && item['type'] == 'web' } || services.first
          unless service.is_a?(Hash)
            warn 'render.yaml service entries must be mappings'
            exit 1
          end

          required = %w[name type]
          missing = required.select { |key| service[key].to_s.strip.empty? }
          unless missing.empty?
            warn "render.yaml first deployable service is missing: #{missing.join(', ')}"
            exit 1
          end

          text = File.read(path, encoding: 'UTF-8').downcase
          forbidden = [
            'render_deploy_hook',
            'api.render.com/deploy',
            'sk-',
            'ghp_',
            'github_pat_',
            'telegram_bot_token'
          ]
          marker = forbidden.find { |value| text.include?(value) }
          if marker
            warn "forbidden secret/deploy marker found in render.yaml: #{marker}"
            exit 1
          end

          root_dir = service.fetch('rootDir', '.').to_s
          health_path = service.fetch('healthCheckPath', '').to_s
          if service['type'] == 'web' && health_path.strip.empty?
            warn 'web services in render.yaml must define healthCheckPath'
            exit 1
          end

          File.open(ENV.fetch('GITHUB_OUTPUT'), 'a') do |out|
            out.puts "service_name=#{service.fetch('name')}"
            out.puts "service_type=#{service.fetch('type')}"
            out.puts "runtime=#{service.fetch('runtime', '')}"
            out.puts "service_path=#{root_dir.empty? ? '.' : root_dir}"
            out.puts "health_check_path=#{health_path}"
          end
          puts 'render.yaml syntax and deployment-safety checks passed'
          RUBY
          else
            echo "No render.yaml found. Continuing with repository-level preflight."
            {
              echo "service_name="
              echo "service_type="
              echo "runtime="
              echo "service_path=."
              echo "health_check_path="
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify service path exists
        run: |
          set -euo pipefail
          service_path='${{ steps.render.outputs.service_path }}'
          if [ ! -d "$service_path" ]; then
            echo "Render service path does not exist: $service_path"
            exit 1
          fi
          echo "Render preflight service path exists."

      - name: Detect project type
        id: detect
        run: |
          set -euo pipefail
          service_path='${{ steps.render.outputs.service_path }}'
          if [ -f "$service_path/package.json" ]; then
            echo "project_type=node" >> "$GITHUB_OUTPUT"
          elif [ -f "$service_path/pyproject.toml" ] || [ -f "$service_path/requirements.txt" ]; then
            echo "project_type=python" >> "$GITHUB_OUTPUT"
          elif [ -f "$service_path/Dockerfile" ]; then
            echo "project_type=docker" >> "$GITHUB_OUTPUT"
          elif [ -f "$service_path/index.html" ] || [ -d "$service_path/public" ] || [ -d "$service_path/static" ]; then
            echo "project_type=static" >> "$GITHUB_OUTPUT"
          else
            echo "project_type=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Node preflight
        if: steps.detect.outputs.project_type == 'node'
        working-directory: ${{ steps.render.outputs.service_path }}
        run: |
          set -euo pipefail
          node --version
          npm --version
          if [ -f package-lock.json ]; then
            npm ci --include=dev
          else
            npm install --include=dev
          fi
          npm run build --if-present
          npm test --if-present

      - name: Python preflight
        if: steps.detect.outputs.project_type == 'python'
        working-directory: ${{ steps.render.outputs.service_path }}
        run: |
          set -euo pipefail
          python --version
          python -m compileall .
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          fi
          if [ -d tests ]; then
            python -m pip install pytest
            pytest -q
          fi

      - name: Docker preflight
        if: steps.detect.outputs.project_type == 'docker'
        working-directory: ${{ steps.render.outputs.service_path }}
        run: |
          set -euo pipefail
          docker build -t qarar-render-preflight .

      - name: Static preflight
        if: steps.detect.outputs.project_type == 'static'
        working-directory: ${{ steps.render.outputs.service_path }}
        run: |
          set -euo pipefail
          if [ ! -f index.html ] && [ ! -d public ] && [ ! -d static ]; then
            echo "Static project must include index.html, public/, or static/."
            exit 1
          fi
          echo "Static project preflight passed."

      - name: Unknown project type
        if: steps.detect.outputs.project_type == 'unknown'
        run: |
          echo "Could not detect Node, Python, Docker, or static project type."
          echo "Render deployment requires render.yaml to point at a recognizable runtime."
          exit 1
