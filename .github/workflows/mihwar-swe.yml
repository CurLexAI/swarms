# mihwar-swe.yml — SWE-mode execution workflow for Mihwar (المحور)
# Trigger: PR or issue comment starting with /mihwar
# Role: implementer — produces [mihwar][plan] comment with files + steps
# Boundary: source-only, scaffold_only, paired Bayyinah review required
# No deploy, no merge, no secret reads beyond declared endpoint secrets.

name: Mihwar SWE Mode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mihwar-swe:
    name: Mihwar — SWE Execution
    runs-on: ubuntu-latest

    # Only fire on /mihwar trigger from OWNER or MEMBER
    if: |
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      startsWith(github.event.comment.body, '/mihwar') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        id: secrets-check
        run: |
          if [[ -z "${{ secrets.MIHWAR_ENDPOINT }}" || -z "${{ secrets.AGENT_API_TOKEN }}" ]]; then
            echo "status=SKIPPED_UNVERIFIED" >> "$GITHUB_OUTPUT"
            echo "::warning::Mihwar Agent UNVERIFIED — MIHWAR_ENDPOINT or AGENT_API_TOKEN not configured. Exiting 0."
          else
            echo "status=READY" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract PR context
        id: pr-context
        if: steps.secrets-check.outputs.status == 'READY'
        run: |
          # Resolve PR number from comment context
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          # Extract instruction text after /mihwar trigger
          INSTRUCTION=$(echo "${{ github.event.comment.body }}" | tail -n +2 | xargs)
          echo "instruction=${INSTRUCTION}" >> "$GITHUB_OUTPUT"

      - name: Fetch PR diff
        id: fetch-diff
        if: steps.secrets-check.outputs.status == 'READY'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ steps.pr-context.outputs.pr_number }} > /tmp/pr.diff 2>/dev/null || echo "" > /tmp/pr.diff
          echo "diff_path=/tmp/pr.diff" >> "$GITHUB_OUTPUT"

      - name: Invoke Mihwar endpoint
        id: mihwar-invoke
        if: steps.secrets-check.outputs.status == 'READY'
        env:
          MIHWAR_ENDPOINT: ${{ secrets.MIHWAR_ENDPOINT }}
          AGENT_API_TOKEN: ${{ secrets.AGENT_API_TOKEN }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr.diff | head -c 32000)  # stay within token budget
          INSTRUCTION="${{ steps.pr-context.outputs.instruction }}"
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ steps.pr-context.outputs.pr_number }}"

          PAYLOAD=$(jq -n \
            --arg repo "${REPO}" \
            --arg pr "${PR_NUMBER}" \
            --arg diff "${DIFF_CONTENT}" \
            --arg instruction "${INSTRUCTION}" \
            --arg role "implementer" \
            --arg boundary "scaffold_only" \
            '{
              role: $role,
              boundary: $boundary,
              repo: $repo,
              pr_number: $pr,
              diff: $diff,
              instruction: $instruction
            }')

          RESPONSE=$(curl -sS --max-time 120 \
            -X POST "${MIHWAR_ENDPOINT}" \
            -H "Authorization: Bearer ${AGENT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          # Write raw response to file to avoid shell escaping issues
          echo "${RESPONSE}" > /tmp/mihwar-response.json
          PLAN=$(echo "${RESPONSE}" | jq -r '.plan // .output // .result // "No plan returned."')
          echo "${PLAN}" > /tmp/mihwar-plan.txt

      - name: Post plan comment to PR
        if: steps.secrets-check.outputs.status == 'READY'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN=$(cat /tmp/mihwar-plan.txt)
          ACTOR="${{ github.event.comment.user.login }}"
          PR_NUMBER="${{ steps.pr-context.outputs.pr_number }}"

          COMMENT_BODY=$(cat <<EOF
          ### [mihwar][plan] — Mihwar SWE Execution

          > Triggered by @${ACTOR} via \`/mihwar\`
          > Boundary: \`scaffold_only\` · No deploy · No merge · Paired Bayyinah review required

          ${PLAN}

          ---
          *Run \`/bayyinah\` to request Bayyinah security and policy review of this plan.*
          EOF
          )

          gh pr comment "${PR_NUMBER}" --body "${COMMENT_BODY}"

      - name: Post SKIPPED_UNVERIFIED notice
        if: steps.secrets-check.outputs.status == 'SKIPPED_UNVERIFIED'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$([
            "${{ github.event_name }}" == "issue_comment"
          ] && echo "${{ github.event.issue.number }}" || echo "${{ github.event.pull_request.number }}")

          gh pr comment "${PR_NUMBER}" --body \
            $'### [mihwar][skipped]\n\n`MIHWAR_ENDPOINT` or `AGENT_API_TOKEN` is not configured.\nMihwar Agent **SKIPPED_UNVERIFIED** — configure secrets to enable SWE execution.' \
            2>/dev/null || true
