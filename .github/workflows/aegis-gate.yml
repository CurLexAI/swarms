name: Aegis Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  aegis-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements-agent.txt

      - name: Run Aegis final verification gate
        run: python3 scripts/verify_aegis.py
