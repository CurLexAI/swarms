name: Aegis Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  aegis-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core Python dependencies
        run: python3 -m pip install pyyaml pytest requests httpx pydantic modal beautifulsoup4 pdfplumber minio qdrant-client

      - name: Install remaining dependencies (best-effort)
        # FlagEmbedding / warc3-wet-clueweb09 / cbor may fail to build wheels
        # in CI — allow failure so the gate still runs with the core deps above.
        run: python3 -m pip install -r requirements-agent.txt || true

      - name: Diagnose gate environment
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== Key packages ==="
          python3 -m pip show pytest pydantic httpx minio qdrant-client 2>&1 | grep -E "^Name:|^Version:" || true
          echo "=== AI key env vars present (names only, no values) ==="
          for k in OPENAI_API_KEY ANTHROPIC_API_KEY GOOGLE_API_KEY GEMINI_API_KEY VERTEX_API_KEY; do
            [ -n "${!k+x}" ] && echo "PRESENT: $k" || echo "ABSENT:  $k"
          done

      - name: Run Aegis final verification gate
        run: |
          unset OPENAI_API_KEY ANTHROPIC_API_KEY GOOGLE_API_KEY GEMINI_API_KEY VERTEX_API_KEY 2>/dev/null || true
          python3 scripts/verify_aegis.py
