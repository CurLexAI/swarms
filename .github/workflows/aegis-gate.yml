name: Aegis Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  aegis-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core Python dependencies
        run: python3 -m pip install pyyaml pytest requests httpx pydantic modal beautifulsoup4 pdfplumber minio qdrant-client

      - name: Install remaining dependencies (best-effort)
        # FlagEmbedding / warc3-wet-clueweb09 / cbor may fail to build wheels
        # in CI — allow failure so the gate still runs with the core deps above.
        run: python3 -m pip install -r requirements-agent.txt || true

      - name: Run Aegis final verification gate
        run: python3 scripts/verify_aegis.py
