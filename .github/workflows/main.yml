name: Main CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-and-node-gates:
    name: Python and Node gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-agent.txt

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-agent.txt

      - name: Validate agent assets
        run: python3 .agents/validate.py

      - name: Syntax-check Python agent files
        run: python3 -m py_compile .agents/*.py

      - name: Show configured agents
        run: python3 .agents/invoke.py info

      - name: Run full Python test suite
        run: python3 -m pytest -q tests/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci --include=dev

      - name: Run aggregate Node gate
        run: npm run check

      # The Qala audit chain is no longer tracked in git (ADR-0008 §Decision.4):
      # `npm run check` runs qala-audit-integrity-gate.sh, which deterministically
      # seals artifacts/security/qala-audit.jsonl from the merge-safe event source
      # and verifies it against the committed anchor. Publish the sealed chain as a
      # build artifact so it is reviewable without being committed.
      - name: Upload sealed Qala audit chain
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qala-audit-chain
          path: artifacts/security/qala-audit.jsonl
          if-no-files-found: warn
          retention-days: 90

      - name: Run full JavaScript Node test suite
        run: node --import tsx --test tests/*.test.js

      - name: Run TypeScript-backed Node tests
        run: node --import tsx --test tests/*.test.ts
