name: Vercel Deploy

on:
  pull_request:
    paths:
      - "public/**"
      - "vercel.json"
      - ".github/workflows/vercel-deploy.yml"
      - "docs/deployment/vercel.md"
  push:
    branches: [main]
    paths:
      - "public/**"
      - "vercel.json"
      - ".github/workflows/vercel-deploy.yml"
      - "docs/deployment/vercel.md"

permissions:
  contents: read
  deployments: write
  pull-requests: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  modal-boundary:
    name: Modal boundary gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure public frontend cannot call Modal directly
        run: bash scripts/commander/modal-boundary-gate.sh .

  preview:
    name: Preview deployment
    if: github.event_name == 'pull_request'
    needs: modal-boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Validate Vercel secret presence
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Pull Vercel preview environment
        run: npx --yes vercel@latest pull --yes --environment=preview --token "$VERCEL_TOKEN"
      - name: Build Vercel preview artifact
        run: npx --yes vercel@latest build --token "$VERCEL_TOKEN"
      - name: Deploy Vercel preview artifact
        run: npx --yes vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN"

  production:
    name: Production deployment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: modal-boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Validate Vercel secret presence
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Pull Vercel production environment
        run: npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
      - name: Build Vercel production artifact
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"
      - name: Deploy Vercel production artifact
        run: npx --yes vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN"
