name: Modal Runtime Activation

on:
  workflow_dispatch:
    inputs:
      deploy_modal:
        description: "Deploy .agents/modal_app.py to Modal"
        required: false
        type: boolean
        default: false
      run_smoke:
        description: "Run Modal smoke entrypoints"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  activation:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Mask secrets
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          BAYYINAH_ENDPOINT: ${{ secrets.BAYYINAH_ENDPOINT }}
          MIHWAR_ENDPOINT: ${{ secrets.MIHWAR_ENDPOINT }}
          BAYYINAH_API_TOKEN: ${{ secrets.BAYYINAH_API_TOKEN }}
          MIHWAR_API_TOKEN: ${{ secrets.MIHWAR_API_TOKEN }}
        run: |
          set -euo pipefail
          for v in MODAL_TOKEN_ID MODAL_TOKEN_SECRET BAYYINAH_ENDPOINT MIHWAR_ENDPOINT BAYYINAH_API_TOKEN MIHWAR_API_TOKEN; do
            if [[ -n "${!v:-}" ]]; then
              echo "::add-mask::${!v}"
            fi
          done

      - name: Install Modal CLI
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install modal

      - name: Validation gates
        run: |
          set -euo pipefail
          python .agents/invoke.py info
          python .agents/validate.py
          python -m py_compile .agents/*.py
          bash scripts/commander/p0-security-test-gate.sh
          bash scripts/commander/modal-boundary-gate.sh
          bash scripts/commander/agent-presence-gate.sh
          modal --version

      - name: Configure Modal token
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${MODAL_TOKEN_ID:-}" || -z "${MODAL_TOKEN_SECRET:-}" ]]; then
            echo "FINAL_STATUS=UNVERIFIED_SECRET_MISSING" >> "$GITHUB_ENV"
            exit 0
          fi
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"
          # Baseline once secrets are present but nothing live ran yet. Later
          # steps override this with VERIFIED_MODAL_DEPLOYED / _CLI_ONLY /
          # _ENDPOINT_SMOKE_AND_TOKEN_ISOLATION when they actually execute.
          echo "FINAL_STATUS=VERIFIED_PREFLIGHT_ONLY" >> "$GITHUB_ENV"

      - name: Deploy Modal app (optional)
        if: ${{ env.FINAL_STATUS != 'UNVERIFIED_SECRET_MISSING' && inputs.deploy_modal }}
        run: |
          set -euo pipefail
          modal deploy .agents/modal_app.py
          echo "FINAL_STATUS=VERIFIED_MODAL_DEPLOYED" >> "$GITHUB_ENV"

      - name: Run Modal smoke entrypoints (optional)
        if: ${{ env.FINAL_STATUS != 'UNVERIFIED_SECRET_MISSING' && inputs.run_smoke }}
        run: |
          set -euo pipefail
          modal run .agents/modal_app.py
          modal run .agents/modal_app.py::test_bayyinah
          echo "FINAL_STATUS=VERIFIED_MODAL_CLI_ONLY" >> "$GITHUB_ENV"

      - name: Endpoint smoke (optional)
        if: ${{ env.FINAL_STATUS != 'UNVERIFIED_SECRET_MISSING' && inputs.run_smoke }}
        env:
          BAYYINAH_ENDPOINT: ${{ secrets.BAYYINAH_ENDPOINT }}
          MIHWAR_ENDPOINT: ${{ secrets.MIHWAR_ENDPOINT }}
          BAYYINAH_API_TOKEN: ${{ secrets.BAYYINAH_API_TOKEN }}
          MIHWAR_API_TOKEN: ${{ secrets.MIHWAR_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BAYYINAH_ENDPOINT:-}" || -z "${MIHWAR_ENDPOINT:-}" || -z "${BAYYINAH_API_TOKEN:-}" || -z "${MIHWAR_API_TOKEN:-}" ]]; then
            echo "FINAL_STATUS=UNVERIFIED_SECRET_MISSING" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ "$BAYYINAH_API_TOKEN" == "$MIHWAR_API_TOKEN" ]]; then
            echo "FINAL_STATUS=BLOCKED_SHARED_ENDPOINT_TOKEN" >> "$GITHUB_ENV"
            exit 1
          fi
          bayyinah_status="$(curl -sS --max-time 240 -o /tmp/bayyinah.json -w '%{http_code}' -H 'Content-Type: application/json' -H "Authorization: Bearer ${BAYYINAH_API_TOKEN}" -X POST -d '{"code":"def add(a,b):return a+b","context":"smoke"}' "$BAYYINAH_ENDPOINT" || echo 000)"
          mihwar_status="$(curl -sS --max-time 420 -o /tmp/mihwar.json -w '%{http_code}' -H 'Content-Type: application/json' -H "Authorization: Bearer ${MIHWAR_API_TOKEN}" -X POST -d '{"task":"return integer 1","context_files":{}}' "$MIHWAR_ENDPOINT" || echo 000)"
          bayyinah_cross_status="$(curl -sS --max-time 120 -o /tmp/bayyinah-cross.json -w '%{http_code}' -H 'Content-Type: application/json' -H "Authorization: Bearer ${MIHWAR_API_TOKEN}" -X POST -d '{"code":"def add(a,b):return a+b","context":"cross-token-negative-smoke"}' "$BAYYINAH_ENDPOINT" || echo 000)"
          mihwar_cross_status="$(curl -sS --max-time 120 -o /tmp/mihwar-cross.json -w '%{http_code}' -H 'Content-Type: application/json' -H "Authorization: Bearer ${BAYYINAH_API_TOKEN}" -X POST -d '{"task":"return integer 1","context_files":{}}' "$MIHWAR_ENDPOINT" || echo 000)"
          rm -f /tmp/bayyinah.json /tmp/mihwar.json /tmp/bayyinah-cross.json /tmp/mihwar-cross.json
          if [[ "$bayyinah_status" == "200" && "$mihwar_status" == "200" && "$bayyinah_cross_status" =~ ^(401|403)$ && "$mihwar_cross_status" =~ ^(401|403)$ ]]; then
            echo "FINAL_STATUS=VERIFIED_ENDPOINT_SMOKE_AND_TOKEN_ISOLATION" >> "$GITHUB_ENV"
          else
            echo "FINAL_STATUS=BLOCKED_MODAL_FAILURE" >> "$GITHUB_ENV"
            exit 1
          fi

      - name: Final status summary
        if: always()
        run: |
          set -euo pipefail
          status="${FINAL_STATUS:-BLOCKED_MODAL_FAILURE}"
          echo "## Modal runtime activation verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "FINAL_STATUS=$status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Only a real live endpoint smoke counts as activation verified.
          case "$status" in
            VERIFIED_ENDPOINT_SMOKE_AND_TOKEN_ISOLATION)
              echo "Activation verified: Bayyinah + Mihwar endpoints are live and token isolation holds." >> "$GITHUB_STEP_SUMMARY"
              ;;
            VERIFIED_PREFLIGHT_ONLY)
              echo "Preflight only. This run did NOT deploy Modal and did NOT smoke endpoints. Not an activation." >> "$GITHUB_STEP_SUMMARY"
              ;;
            VERIFIED_MODAL_DEPLOYED)
              echo "Deployed to Modal, but endpoints were NOT smoke-tested. Not activation verified." >> "$GITHUB_STEP_SUMMARY"
              ;;
            VERIFIED_MODAL_CLI_ONLY)
              echo "Modal CLI entrypoints ran, but live endpoints were NOT verified. Not activation verified." >> "$GITHUB_STEP_SUMMARY"
              ;;
            UNVERIFIED_SECRET_MISSING)
              echo "Secrets missing or not bound to the production environment. Nothing was contacted." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              echo "Blocked or unknown. Review the step logs." >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
