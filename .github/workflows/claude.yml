name: Claude Code Action

# Interactive @claude mention workflow using claude-code-action v1.
# Responds when OWNER or MEMBER mentions @claude in a PR or issue comment.
# Boundary gates run before any secret is read (same pattern as agent-review.yml).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    name: Claude — interactive assist
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only fire on @claude mentions from OWNER or MEMBER.
    if: |
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      contains(github.event.comment.body, '@claude') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Boundary gates run before secrets are read (ADR-0001 / modal-boundary-gate pattern).
      - name: Modal boundary gate
        run: bash scripts/commander/modal-boundary-gate.sh .

      - name: ADR-0001 boundary gate
        run: bash scripts/commander/adr-0001-boundary-gate.sh .

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
            --allowedTools Edit,Read,Write,Bash
            --system-prompt "You are operating in the CurLexAI/swarms repository — the agent operations and validation layer for CurLexAI. Follow boundary policies in CLAUDE.md and ADR-0001. Do not expose Modal endpoints, API tokens, or any *.modal.run URLs to any surface. Do not add backend_fastapi/, src/routes/, or other forbidden paths. Report findings using VERIFIED / INFERRED / UNVERIFIED evidence labels."
