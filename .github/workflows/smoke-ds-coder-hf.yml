name: DeepSeek-Coder HF Smoke Public Only

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/smoke-ds-coder-hf.yml"
      - ".github/smoke_allowlist.yml"
      - "scripts/hf_public_coding_smoke.py"
      - "tests/fixtures/synthetic_public_task.json"
      - "docs/operations/hf-public-coding-smoke.md"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: HF_SMOKE
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Run public-only Hugging Face smoke
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_READ_TOKEN: ${{ secrets.HF_READ_TOKEN }}
          MIHWAR_HF_MODEL_ID: ${{ vars.MIHWAR_HF_MODEL_ID || 'deepseek-ai/DeepSeek-Coder-V2-Instruct' }}
          BAYYINAH_HF_MODEL_ID: ${{ vars.BAYYINAH_HF_MODEL_ID || 'Qwen/Qwen2.5-Coder-32B-Instruct' }}
          MIHWAR_HF_PROVIDER: ${{ vars.MIHWAR_HF_PROVIDER }}
          BAYYINAH_HF_PROVIDER: ${{ vars.BAYYINAH_HF_PROVIDER }}
        run: python scripts/hf_public_coding_smoke.py
