name: Copilot setup steps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - tsconfig.json
      - "src/**/*.ts"
      - "scripts/**/*.ts"
      - "tests/**/*.ts"
      - .github/workflows/copilot-setup-steps.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - tsconfig.json
      - "src/**/*.ts"
      - "scripts/**/*.ts"
      - "tests/**/*.ts"
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    name: TypeScript-focused Copilot setup steps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build --if-present

      - name: Check runtime policy
        run: npm run check:runtime-policy --if-present

      - name: Test runtime policy
        run: npm run test:runtime-policy --if-present

      - name: Run TypeScript typecheck
        run: npm run typecheck --if-present

      - name: Run lint
        run: npm run lint --if-present

      - name: Run aggregate no-secrets checks
        run: npm run check --if-present

      - name: Run repository tests
        run: npm test --if-present
