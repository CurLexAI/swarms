name: Copilot Setup Steps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - tsconfig.json
      - "src/**/*.ts"
      - "scripts/**/*.ts"
      - "tests/**/*.ts"
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - tsconfig.json
      - "src/**/*.ts"
      - "scripts/**/*.ts"
      - "tests/**/*.ts"

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Check runtime policy
        run: npm run check:runtime-policy --if-present

      - name: Test runtime policy
        run: npm run test:runtime-policy --if-present

      - name: Test
        run: npm test --if-present
