name: Copilot setup steps
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  copilot-setup-steps:
    name: Prepare no-secrets Copilot MCP environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install local MCP dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mcp>=1.0.0"
      - name: Verify no production secrets are required
        run: |
          unset OPENAI_API_KEY || true
          unset ANTHROPIC_API_KEY || true
          unset GEMINI_API || true
          unset GEMINI_API_KEY || true
          unset GROK_API || true
          unset GROQ_API_KEY || true
          unset GITHUB_TOKEN_OVERRIDE || true
          unset RENDER_DEPLOY_HOOK || true
          unset RAPTOR_TELEGRAM_BOT_TOKEN || true
          echo "NO_SECRETS_MODE=true" >> "$GITHUB_ENV"
      - name: Validate offline MCP server exists
        run: |
          test -f .agents/mcp/server_offline.py
          python -m py_compile .agents/mcp/server_offline.py
      - name: Security reminder
        run: |
          echo "Copilot MCP is configured in no-secrets offline mode."
          echo "Do not add live tokens, deploy hooks, or provider API keys to this repository."
