name: Copilot Agent Profiles Preflight

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - "scripts/commander/copilot-agent-profiles-gate.py"
      - ".github/workflows/copilot-agent-profiles-preflight.yml"
  push:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - "scripts/commander/copilot-agent-profiles-gate.py"
      - ".github/workflows/copilot-agent-profiles-preflight.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-agent-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Copilot custom agent profiles
        run: python3 scripts/commander/copilot-agent-profiles-gate.py .
