name: Bayyinah SWE (Qwen2.5-Coder-32B)

# ── Triggers ────────────────────────────────────────────────────────────────
# Fires only on PR/issue comments whose body starts with `/bayyinah`.
# This is on-demand re-review, distinct from the automatic
# `agent-review.yml` flow that runs on every PR push.
on:
  issue_comment:
    types: [created]

# ── Permissions ─────────────────────────────────────────────────────────────
permissions:
  pull-requests: write   # post review comments
  issues: write          # post status replies
  contents: read         # read the diff

jobs:
  bayyinah-swe:
    name: "Bayyinah SWE (/bayyinah trigger)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: |
      startsWith(github.event.comment.body, '/bayyinah') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Boundary gate runs BEFORE any secret is read.
      - name: Modal boundary gate
        run: bash scripts/commander/modal-boundary-gate.sh .

      - name: Guard PR context
        if: github.event.issue.pull_request == null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f body="[bayyinah][skip] /bayyinah must be invoked on a pull request, not an issue."
          exit 0

      - name: Resolve PR head
        id: pr
        if: github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="${{ github.event.issue.number }}"
          head_sha=$(gh api "repos/${{ github.repository }}/pulls/${pr_number}" --jq .head.sha)
          base_ref=$(gh api "repos/${{ github.repository }}/pulls/${pr_number}" --jq .base.ref)
          echo "number=${pr_number}"   >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}"  >> "$GITHUB_OUTPUT"
          echo "base_ref=${base_ref}"  >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: github.event.issue.pull_request != null
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event.issue.pull_request != null
        run: pip install --quiet requests pyyaml

      - name: Generate PR diff
        id: diff
        if: github.event.issue.pull_request != null
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          git diff "origin/$BASE_REF"...${{ steps.pr.outputs.head_sha }} > /tmp/pr.diff
          LINES=$(wc -l < /tmp/pr.diff)
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "Diff size: $LINES lines"

      - name: Run Bayyinah SWE review
        if: |
          github.event.issue.pull_request != null &&
          steps.diff.outputs.lines != '0' &&
          fromJSON(steps.diff.outputs.lines) < 2000
        env:
          BAYYINAH_ENDPOINT: ${{ secrets.BAYYINAH_ENDPOINT }}
          AGENT_API_TOKEN: ${{ secrets.AGENT_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          if [ -z "$BAYYINAH_ENDPOINT" ] || [ -z "$AGENT_API_TOKEN" ]; then
            echo "::warning title=Bayyinah Agent UNVERIFIED::BAYYINAH_ENDPOINT or AGENT_API_TOKEN is missing. Skipping until Modal deployment is live."
            gh api -X POST \
              "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="[bayyinah][SKIPPED_UNVERIFIED] Bayyinah endpoint or API token is not configured. See \`docs/secrets-policy.md\` §3."
            exit 0
          fi

          echo "Bayyinah secrets are present. Initiating Bayyinah SWE re-review."
          python .agents/pr_review.py \
            --diff /tmp/pr.diff \
            --pr "$PR_NUMBER" \
            --repo "$REPO" \
            --head-sha "$HEAD_SHA" \
            --agent bayyinah
