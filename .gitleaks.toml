title = "Qarar Secret Scanning Rules"

[allowlist]
description = "Allow safe examples only"
paths = [
  '''\.env\.example$''',
  '''README.*''',
  '''docs/.*'''
]

[[rules]]
id = "openai-key"
description = "OpenAI API key"
regex = '''sk-(proj|admin)?-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "github-token"
description = "GitHub token"
regex = '''gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}'''
tags = ["key", "github"]

[[rules]]
id = "telegram-bot-token"
description = "Telegram bot token"
regex = '''[0-9]{8,12}:[A-Za-z0-9_\-]{30,}'''
tags = ["key", "telegram"]

[[rules]]
id = "render-deploy-hook"
description = "Render deploy hook"
regex = '''https://api\.render\.com/deploy/srv-[A-Za-z0-9_\-]+'''
tags = ["deploy", "render"]

[[rules]]
id = "google-api-key"
description = "Google/Gemini API key"
regex = '''AIza[0-9A-Za-z_\-]{20,}'''
tags = ["key", "google"]

[[rules]]
id = "perplexity-key"
description = "Perplexity API key"
regex = '''pplx-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "perplexity"]

[[rules]]
id = "groq-key"
description = "Groq API key"
regex = '''gsk_[A-Za-z0-9_\-]{20,}'''
tags = ["key", "groq"]

[[rules]]
id = "xai-key"
description = "xAI/Grok key"
regex = '''xai-[A-Za-z0-9_\-]{20,}'''
tags = ["key", "xai"]

[[rules]]
id = "bcrypt-hash"
description = "Bcrypt password hash"
regex = '''\$2[aby]\$[0-9]{2}\$[./A-Za-z0-9]{53}'''
tags = ["password", "hash"]
