version: "3.8"

services:

  mihwar-core:
    build:
      context: ./mihwar-core
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "443:443/udp"
    environment:
      MIHWAR_ENV: production
      MIHWAR_REGION: SA
      DATABASE_URL: "postgresql://mihwar:sovereign@postgres:5432/mihwar?sslmode=disable"
      HTTP_ADDR: ":8080"
      QUIC_ADDR: ":443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mihwar-sovereign
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mihwar
      POSTGRES_PASSWORD: sovereign
      POSTGRES_DB: mihwar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mihwar-sovereign
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mihwar -d mihwar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass sovereign --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mihwar-sovereign
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sovereign", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wireguard:
    image: linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: "1000"
      PGID: "1000"
      SERVERURL: "mihwar.qarar.sa"
      SERVERPORT: "51820"
      PEERS: "windows-agent,ios-companion"
      PEERDNS: "10.200.200.1"
      INTERNAL_SUBNET: "10.200.200.0"
    volumes:
      - wireguard_config:/config
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - mihwar-sovereign
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443/tcp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    depends_on:
      - mihwar-core
    networks:
      - mihwar-sovereign
    restart: unless-stopped

volumes:
  postgres_data:
  wireguard_config:

networks:
  mihwar-sovereign:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.200.0/24
